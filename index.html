<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - Order Tracking</title>
  <meta charset="UTF-8" />
  <style>
    body { font-family: Arial,sans-serif; background:#f4f6f9; padding:20px; }
    h2 { text-align:center; margin-bottom:10px; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .refresh-btn { padding:8px 14px; background:#fe3d00; color:white; border:none; border-radius:6px; cursor:pointer; }
    .refresh-btn:hover { opacity:0.9; }
    .count { font-weight:bold; }
    table { width:100%; border-collapse:collapse; background:white; }
    th, td { padding:12px; border:1px solid #ddd; text-align:left; vertical-align:top; }
    th { background:#000; color:white; }
    tr:nth-child(even){ background:#f9f9f9; }
    img.product-img { width:50px; height:50px; object-fit:cover; border-radius:4px; margin-right:10px; }
    .loader { text-align:center; margin-top:20px; font-weight:bold; }
    select.status-select { padding:4px 6px; border-radius:4px; border:1px solid #ccc; cursor:pointer; }
  </style>
</head>
<body>

<h2>📦 Admin Order Tracking Panel</h2>

<div class="top-bar">
  <div class="count">Total Orders: <span id="orderCount">0</span></div>
  <button class="refresh-btn" onclick="fetchOrders()">🔄 Refresh</button>
</div>

<div class="loader" id="loader">Loading orders...</div>

<table id="ordersTable" style="display:none;">
  <thead>
    <tr>
      <th>#</th>
      <th>User Name</th>
      <th>User Email</th>
      <th>Products</th>
      <th>Order Message</th>
      <th>Date</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="ordersBody"></tbody>
</table>

<script>
const statusOrder = ["Received","Processing","Shipped","Delivered","Cancelled"];

function getTrackingHTML(order) {
  const selectId = "status-" + order._id;
  return `
    <select class="status-select" id="${selectId}" onchange="updateStatus('${order._id}')">
      ${statusOrder.map(status => `
        <option value="${status}" ${status === order.orderStatus ? "selected" : ""}>${status}</option>
      `).join('')}
    </select>
  `;
}

async function fetchOrders() {
  const loader = document.getElementById("loader");
  const table = document.getElementById("ordersTable");
  const tbody = document.getElementById("ordersBody");
  const countSpan = document.getElementById("orderCount");

  loader.style.display = "block";
  table.style.display = "none";
  tbody.innerHTML = "";

  try {
    const res = await fetch("http://localhost:3000/api/customer-orders");
    const result = await res.json();
    const orders = result.orders || [];
    countSpan.innerText = orders.length;

    orders.forEach((order, index) => {
      const productsHTML = order.products.map(p => `
        <div style="display:flex; align-items:center; margin-bottom:5px;">
          <img class="product-img" src="${p.image}" alt="${p.title}" />
          <span>${p.title} x${p.quantity} - ₹${p.price}</span>
        </div>
      `).join('');

      const statusHTML = getTrackingHTML(order);

      tbody.innerHTML += `
        <tr>
          <td>${index + 1}</td>
          <td>${order.userName || "Unknown User"}</td>
          <td>${order.userEmail || "unknown@example.com"}</td>
          <td>${productsHTML}</td>
          <td>${order.message ? order.message.replace(/\n/g, "<br>") : ''}</td>
          <td>${new Date(order.createdAt).toLocaleString()}</td>
          <td>${statusHTML}</td>
        </tr>
      `;
    });

    loader.style.display = "none";
    table.style.display = "table";
  } catch (err) {
    loader.innerText = "❌ Failed to load orders";
    console.error(err);
  }
}

async function updateStatus(orderId) {
  const selectEl = document.getElementById("status-" + orderId);
  const newStatus = selectEl.value;

  try {
    const res = await fetch(`http://localhost:3000/api/customer-orders/${orderId}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ orderStatus: newStatus })
    });
    const data = await res.json();
    if (data.success) {
      console.log(`Order ${orderId} status updated to ${newStatus}`);
      fetchOrders();
    } else {
      alert("Failed to update status");
    }
  } catch (err) {
    console.error("Error updating status:", err);
    alert("Error updating status");
  }
}

// Initial fetch
fetchOrders();

// Auto-refresh every 30s
setInterval(fetchOrders, 30000);
</script>

</body>
</html>

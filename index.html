<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - Orders</title>
  <meta charset="UTF-8" />
  <style>
    body { font-family: Arial,sans-serif; background:#f4f6f9; padding:20px; }
    h2 { text-align:center; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; }
    .refresh-btn { padding:8px 14px; background:#fe3d00; color:white; border:none; border-radius:6px; cursor:pointer; }
    .refresh-btn:hover { opacity:0.9; }
    .count { font-weight:bold; }
    table { width:100%; border-collapse:collapse; background:white; margin-top:20px; }
    th, td { padding:12px; border:1px solid #ddd; text-align:left; vertical-align:top; }
    th { background:#000; color:white; }
    tr:nth-child(even){ background:#f9f9f9; }
    img.product-img { width:50px; height:50px; object-fit:cover; border-radius:4px; margin-right:10px; }
    .loader { text-align:center; margin-top:20px; font-weight:bold; }
  </style>
</head>
<body>
<h2>📦 Admin Order Panel</h2>
<div class="top-bar">
  <div class="count">Total Orders: <span id="orderCount">0</span></div>
  <button class="refresh-btn" onclick="fetchOrders()">🔄 Refresh</button>
</div>

<div class="loader" id="loader">Loading orders...</div>

<table id="ordersTable" style="display:none;">
  <thead>
    <tr>
      <th>#</th>
      <th>Products</th>
      <th>Order Message</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody id="ordersBody"></tbody>
</table>

<script>
async function fetchOrders() {
  const loader = document.getElementById("loader");
  const table = document.getElementById("ordersTable");
  const tbody = document.getElementById("ordersBody");
  const countSpan = document.getElementById("orderCount");

  loader.style.display = "block";
  table.style.display = "none";
  tbody.innerHTML = "";

  try {
    const res = await fetch("https://serdeptry1st.onrender.com/orders");
    const result = await res.json();
    const orders = result.orders || [];
    countSpan.innerText = result.count || 0;

    orders.forEach((order, index) => {
      const productsHTML = order.products.map(p => `
        <div style="display:flex; align-items:center; margin-bottom:5px;">
          <img class="product-img" src="${p.src}" alt="${p.title}" />
          <span>${p.title} x${p.quantity} - ₹${p.price}</span>
        </div>
      `).join('');

      tbody.innerHTML += `
        <tr>
          <td>${index + 1}</td>
          <td>${productsHTML}</td>
          <td>${order.message ? order.message.replace(/\n/g, "<br>") : ''}</td>
          <td>${new Date(order.createdAt).toLocaleString()}</td>
        </tr>
      `;
    });

    loader.style.display = "none";
    table.style.display = "table";
  } catch (err) {
    loader.innerText = "❌ Failed to load orders";
    console.error(err);
  }
}

fetchOrders();
setInterval(fetchOrders, 30000);
</script>
</body>
</html>
